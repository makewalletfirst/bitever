name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Ubuntu 22.04 환경 빌드 및 테스트 (Windows 빌드 제거)
  ubuntu-native:
    name: 'Ubuntu 22.04 Native Build'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkgconf \
            python3 python3-zmq \
            libevent-dev libboost-dev libsqlite3-dev \
            systemtap-sdt-dev libzmq3-dev \
            qt6-base-dev qt6-tools-dev qt6-l10n-tools \
            libqrencode-dev capnproto libcapnp-dev \
            ccache mold

      # 빌드 속도 향상을 위한 ccache 설정
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          variant: ccache

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_GUI=ON \
            -DWITH_ZMQ=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run Unit Tests
        # 로그 폭주 방지를 위해 --output-on-failure만 유지 (성공 시 로그 미출력)
        # 특정 테스트의 무한 루프를 방지하기 위해 개별 테스트당 10분 타임아웃 설정
        run: |
          export LC_ALL=C
          ctest --test-dir build --output-on-failure -j $(nproc) --timeout 600
