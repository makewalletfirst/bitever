name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu-native:
    name: 'Ubuntu 22.04 Native Build'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkgconf \
            python3 python3-zmq \
            libevent-dev libboost-dev libsqlite3-dev \
            systemtap-sdt-dev libzmq3-dev \
            qt6-base-dev qt6-tools-dev qt6-l10n-tools qt6-tools-dev-tools \
            libgl1-mesa-dev libglu1-mesa-dev \
            libqrencode-dev \
            ccache mold

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          variant: ccache

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_GUI=ON \
            -DWITH_ZMQ=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_IPC=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run Unit Tests
        id: test_step
        shell: bash
        # 로그를 test_result.log 파일에 저장하고, 실패하더라도 다음 step(업로드)을 진행하도록 함
        run: |
          export LC_ALL=C
          ctest --test-dir build --output-on-failure -j $(nproc) --timeout 600 > test_result.log 2>&1 || echo "TEST_FAILED=true" >> $GITHUB_ENV

      # 테스트 로그 파일을 아티팩트로 업로드 (실패하더라도 항상 실행)
      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-logs
          path: test_result.log

      # 테스트가 실패했다면 최종적으로 잡을 실패 처리
      - name: Check Test Status
        if: env.TEST_FAILED == 'true'
        run: exit 1
