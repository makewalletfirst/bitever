name: Build and Test

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool autoconf pkg-config libssl-dev libevent-dev libboost-dev libboost-system-dev libboost-filesystem-dev libboost-test-dev libboost-thread-dev libsqlite3-dev cmake

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF -DENABLE_IPC=OFF

    - name: Build
      run: cmake --build build -j$(nproc)
